<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login - Complaint Management System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            margin:0;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#2563eb,#60a5fa);
            font-family:Arial,Helvetica,sans-serif;
            padding:20px;
        }

        .login-card{
            width:100%;
            max-width:420px;
            background:#fff;
            border-radius:18px;
            padding:35px;
            box-shadow:0 15px 35px rgba(0,0,0,.2);
        }

        h2{
            text-align:center;
            font-weight:bold;
            margin-bottom:8px;
            color:#2563eb;
        }

        .subtitle{
            text-align:center;
            color:#6c757d;
            margin-bottom:25px;
        }

        .form-control{
            height:48px;
            border-radius:10px;
        }

        .btn-primary{
            height:48px;
            border-radius:10px;
            font-weight:600;
        }

        @media(max-width:768px){

            .login-card{
                padding:25px;
            }

            h2{
                font-size:28px;
            }

            .btn-primary,
            .form-control{
                height:50px;
                font-size:16px;
            }
        }
    </style>

</head>

<body>

<div class="login-card">

    <h2>Complaint Management</h2>

    <p class="subtitle">Login to continue</p>

    <p class="text-success text-center" th:if="${param.registered}">
        Registered successfully! Login now.
    </p>

    <p class="text-danger text-center" th:if="${param.error}">
        Invalid email or password.
    </p>

    <form th:action="@{/login}" method="post">

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input
                    type="email"
                    name="email"
                    class="form-control"
                    placeholder="Enter your email"
                    required>
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input
                    type="password"
                    name="password"
                    class="form-control"
                    placeholder="Enter your password"
                    required>
        </div>

        <button type="submit" class="btn btn-primary w-100">
            Login
        </button>

    </form>

    <div class="text-center mt-4">

        Don't have an account?

        <a th:href="@{/register}">
            Register
        </a>

    </div>

</div>

</body>
</html>
