<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand">Welcome, <span th:text="${userName}"></span> (User)</span>
    <a th:href="@{/logout}" class="btn btn-outline-light btn-sm">Logout</a>
</nav>

<div class="container mt-4">

    <div class="card p-3 mb-4">
        <h5>Register new Complaint </h5>
        <form th:action="@{/user/complaint/new}" method="post" class="row g-2">
            <div class="col-md-3">
                <input type="text" name="title" class="form-control" placeholder="Title" required>
            </div>
            <div class="col-md-3">
                <select name="category" class="form-select" required>
                    <option value="ELECTRICAL">Electrical</option>
                    <option value="PLUMBING">Plumbing</option>
                    <option value="CLEANING">Cleaning</option>
                    <option value="INTERNET">Internet</option>
                    <option value="FURNITURE">Furniture</option>
                    <option value="SECURITY">Security</option>
                    <option value="OTHER">Other</option>
                </select>
            </div>
            <div class="col-md-3">
                <input type="text" name="location" class="form-control" placeholder="Location (e.g. Room 204)" required>
            </div>
            <div class="col-md-3">
                <button type="submit" class="btn btn-primary w-100">Submit</button>
            </div>
            <div class="col-12">
                <textarea name="description" class="form-control" placeholder="Description" rows="2" required></textarea>
            </div>
        </form>
    </div>

    <h5>My Complaints</h5>
    <table class="table table-bordered bg-white">
        <thead class="table-dark">
        <tr>
            <th>Title</th>
            <th>Category</th>
            <th>Priority</th>
            <th>Status</th>
            <th>Location</th>
            <th>Created At</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="c : ${complaints}">
            <td th:text="${c.title}"></td>
            <td th:text="${c.category}"></td>
            <td th:text="${c.priority}"></td>
            <td th:text="${c.status}"></td>
            <td th:text="${c.location}"></td>
            <td th:text="${c.createdAt}"></td>
        </tr>
        <tr th:if="${#lists.isEmpty(complaints)}">
            <td colspan="6" class="text-center text-muted">No complaints.</td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
