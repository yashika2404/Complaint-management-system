<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand">Welcome, <span th:text="${userName}"></span> (Admin)</span>
    <div>
        <a th:href="@{/admin/users}" class="btn btn-outline-light btn-sm me-2">All Users</a>
        <a th:href="@{/logout}" class="btn btn-outline-light btn-sm">Logout</a>
    </div>
</nav>

<div class="container mt-4">
    <h5>All Complaints</h5>
    <table class="table table-bordered bg-white">
        <thead class="table-dark">
        <tr>
            <th>Title</th>
            <th>Category</th>
            <th>Priority</th>
            <th>Status</th>
            <th>User</th>
            <th>Assigned Staff</th>
            <th>Assign Staff</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="c : ${complaints}">
            <td th:text="${c.title}"></td>
            <td th:text="${c.category}"></td>
            <td th:text="${c.priority}"></td>
            <td th:text="${c.status}"></td>
            <td th:text="${c.user != null ? c.user.name : '-'}"></td>
            <td th:text="${c.staff != null ? c.staff.name : 'Not Assigned'}"></td>
            <td>
                <form th:action="@{/admin/complaint/{id}/assign(id=${c.id})}" method="post" class="d-flex gap-1">
                    <select name="staffId" class="form-select form-select-sm">
                        <option th:each="s : ${staffList}" th:value="${s.id}" th:text="${s.name}"></option>
                    </select>
                    <button type="submit" class="btn btn-sm btn-primary">Assign</button>
                </form>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(complaints)}">
            <td colspan="7" class="text-center text-muted">No Complaints.</td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
