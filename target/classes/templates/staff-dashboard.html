<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand">Welcome, <span th:text="${userName}"></span> (Staff)</span>
    <a th:href="@{/logout}" class="btn btn-outline-light btn-sm">Logout</a>
</nav>

<div class="container mt-4">
    <h5> Assigned Complaints</h5>
    <table class="table table-bordered bg-white">
        <thead class="table-dark">
        <tr>
            <th>Title</th>
            <th>Description</th>
            <th>Priority</th>
            <th>Status</th>
            <th>Update Status</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="c : ${complaints}">
            <td th:text="${c.title}"></td>
            <td th:text="${c.description}"></td>
            <td th:text="${c.priority}"></td>
            <td th:text="${c.status}"></td>
            <td>
                <form th:action="@{/staff/complaint/{id}/status(id=${c.id})}" method="post" class="d-flex gap-1">
                    <select name="status" class="form-select form-select-sm">
                        <option value="IN_PROGRESS">In Progress</option>
                        <option value="RESOLVED">Resolved</option>
                        <option value="CLOSED">Closed</option>
                    </select>
                    <button type="submit" class="btn btn-sm btn-primary">Update</button>
                </form>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(complaints)}">
            <td colspan="5" class="text-center text-muted">No assigned complaints.</td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
