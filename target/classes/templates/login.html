<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - Complaint System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="card shadow-sm p-4" style="width: 380px;">
        <h3 class="mb-3 text-center">Login</h3>

        <!-- Agar registration successful hui ho to message dikhao -->
        <p class="text-success text-center" th:if="${param.registered}">Registered successfully! Login now.</p>

        <!-- Agar login galat ho to error dikhao -->
        <p class="text-success text-center" th:if="${param.registered}">Login details incorrect.</p>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Login</button>
        </form>

        <p class="text-center mt-3">Account not registered? <a th:href="@{/register}">Register now</a></p>
    </div>
</div>
</body>
</html>
